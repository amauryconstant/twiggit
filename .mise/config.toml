[tools]
go = "1.26.1"
golangci-lint = "2.11.3"
goreleaser = "2.14.3"
ginkgo = "2.28.1"
"go:github.com/boumenot/gocover-cobertura" = "1.4.0"
"go:github.com/cybusio/gocovmerge" = "1.0.1"
pre-commit = "latest"

[env]
experimental = true

# ========================
# Testing & Code Quality
# ========================

[tasks."test"]
description = "Run all tests (unit, integration, e2e, race)"
run = [
    {task="test:unit"},
    {task="test:integration"},
    {task="test:race"},
    {task="test:e2e"}
]


[tasks."test:unit"]
description = "Run unit tests only"
run = "go test -short -tags=!integration ./..."

[tasks."test:integration"]
description = "Run integration tests only"
run = "go test -tags=integration ./test/integration/..."

[tasks."test:race"]
description = "Run tests with race condition detection"
run = "go test -race ./..."

[tasks."test:e2e"]
description = "Run CLI end-to-end tests"
depends = ["build:e2e"]
run = "ginkgo --tags=e2e --keep-going ./test/e2e/..."

[tasks."test:golden"]
description = "Run golden file tests"
run = "ginkgo --tags=e2e --focus=Golden --keep-going ./test/e2e/..."

[tasks."test:golden:update"]
description = "Update golden files"
run = "UPDATE_GOLDEN=true ginkgo --tags=e2e --focus=Golden --keep-going ./test/e2e/..."

[tasks."lint:check"]
description = "Run linting and formatting checks"
run = "golangci-lint run"

[tasks."lint:fix"]
description = "Auto-fix linting issues"
run = "golangci-lint run --fix"

[tasks.format]
description = "Format Go code"
run = "gofmt -w ."

[tasks.check]
description = "Run all validation checks (quick)"
run = [
    {task="format"},
    {task="lint:fix"},
    {task="test"},
]

# ========================
# Building
# ========================

[tasks.build]
description = "Build CLI to bin/twiggit"
depends = ["build:clean"]
run = "mkdir -p bin && go build  -ldflags=\"-X twiggit/internal/version.Version=$(git describe --tags --always --dirty 2>/dev/null || echo dev) -X twiggit/internal/version.Commit=$(git rev-parse HEAD 2>/dev/null || echo unknown) -X twiggit/internal/version.Date=$(date +%Y-%m-%d)\" -o bin/twiggit main.go"
sources = ["cmd/**/*.go", "internal/**/*.go"]
outputs = ["bin/twiggit"]

[tasks."build:local"]
description = "Build and install twiggit locally for testing"
depends = ["build:clean"]
run = "mkdir -p $HOME/.local/bin && go build -ldflags=\"-X twiggit/internal/version.Version=$(git describe --tags --always --dirty 2>/dev/null || echo dev) -X twiggit/internal/version.Commit=$(git rev-parse HEAD 2>/dev/null || echo unknown) -X twiggit/internal/version.Date=$(date +%Y-%m-%d)\" -o $HOME/.local/bin/twiggit main.go"

[tasks."build:e2e"]
description = "Build and install twiggit locally for e2e tests"
depends = ["build:clean"]
run = "mkdir -p $HOME/.local/bin && go build -tags=e2e -o bin/twiggit-e2e main.go"
sources = ["cmd/**/*.go", "internal/**/*.go"]
outputs = ["bin/twiggit-e2e"]

[tasks."build:clean"]
description = "Clean build artifacts"
run = "rm -rf bin/ coverage*.out coverage.html"

# ========================
# Release Management
# ========================

[tasks.release]
description = "Validate, update changelog, commit, and tag a release"
usage = '''
arg "<bump_type>" help="Version bump type" {
    choices "patch" "minor" "major"
}
'''
run = "mise run release:prepare ${usage_bump_type} && mise run release:tag ${usage_bump_type}"
