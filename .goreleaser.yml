# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
project_name: twiggit
version: 2

before:
  hooks:
    - go mod tidy
    - go mod download
    - bash .goreleaser/hooks/create-github-release.sh

snapshot:
  version_template: "{{ incpatch .Version }}-next"

metadata:
  mod_timestamp: '{{ .CommitTimestamp }}'

builds:
  - id: twiggit
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X twiggit/internal/version.Version={{.Version}}
      - -X twiggit/internal/version.Commit={{.Commit}}
      - -X twiggit/internal/version.Date={{.Date}}
    main: ./main.go
    binary: twiggit
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - LICENSE*
      - README.md
      - AGENTS.md

checksum:
  name_template: 'twiggit_{{.Version}}_checksums.txt'
  algorithm: sha256

sboms:
  - artifacts: archive
    documents:
      - "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}_sbom.spdx.json"

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - '^build:'
      - '^Merge pull request'
      - '^Merge branch'
  groups:
    - title: Features
      order: 0
    - title: Bug Fixes
      order: 100
    - title: Other
      order: 999

release:
  gitlab:
    owner: amoconst
    name: twiggit
  mode: replace
  name_template: "v{{ .Version }}"

homebrew_casks:
  - name: twiggit
    repository:
      owner: amoconst
      name: homebrew-tap
      branch: main
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://gitlab.com/amoconst/twiggit
    description: Pragmatic git worktree management tool with focus on rebase workflows
    license: MIT
    skip_upload: auto
    binaries:
      - twiggit
    url:
      template: "https://gitlab.com/amoconst/twiggit/-/releases/{{ .Tag }}/downloads/{{ .ArtifactName }}"
      verified: gitlab.com/amoconst/twiggit
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/twiggit"]
          end

gomod:
  proxy: false
